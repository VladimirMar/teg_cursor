<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TITULAR DO CRM</title>

    <link rel="stylesheet" href="css/login.css" />
    <script src="/backspace-navigation-guard.js"></script>
    <style>
      html:has(#titular-crm-grid-body),
      body:has(#titular-crm-grid-body) {
        overflow: hidden;
        overflow-x: hidden;
        width: 100%;
        max-width: 100%;
      }

      body:has(#titular-crm-grid-body) .dsc-access-page {
        height: 100vh;
        min-height: 0;
        overflow: hidden;
        width: 100%;
        max-width: 100%;
        padding: 4px 10px;
      }

      body:has(#titular-crm-grid-body) #login-section,
      body:has(#titular-crm-grid-body) .dsc-access-layout,
      body:has(#titular-crm-grid-body) .dsc-access-management-layout {
        height: 100%;
        min-height: 0;
      }

      body:has(#titular-crm-grid-body) #login-section {
        margin: 0;
        padding: 0;
      }

      body:has(#titular-crm-grid-body) .dsc-access-layout,
      body:has(#titular-crm-grid-body) .dsc-access-management-layout {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      body:has(#titular-crm-grid-body) .dsc-access-toolbar {
        position: sticky;
        top: 0;
        z-index: 30;
        margin-bottom: 0;
        padding-bottom: 4px;
        background: #ffffff;
      }

      body:has(#titular-crm-grid-body) .dsc-access-grid-card {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 132px);
        min-height: 0;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-wrapper {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table {
        width: 100%;
        min-width: 0;
        table-layout: fixed;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table th:nth-child(1),
      body:has(#titular-crm-grid-body) #titular-crm-grid-table td:nth-child(1) {
        width: 12%;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table th:nth-child(2),
      body:has(#titular-crm-grid-body) #titular-crm-grid-table td:nth-child(2) {
        width: 28%;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table th:nth-child(3),
      body:has(#titular-crm-grid-body) #titular-crm-grid-table td:nth-child(3) {
        width: 38%;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table th:nth-child(4),
      body:has(#titular-crm-grid-body) #titular-crm-grid-table td:nth-child(4) {
        width: 22%;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table .dsc-grid-actions-column {
        text-align: center;
        padding: 0;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table .dsc-grid-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        width: 100%;
        justify-content: center;
        align-items: center;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table .dsc-grid-action-button {
        flex: 0 0 auto;
        min-width: 36px;
        width: 36px;
        height: 36px;
        padding: 6px;
        font-size: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      body:has(#titular-crm-grid-body) #titular-crm-grid-table .dsc-grid-action-button svg {
        width: 18px;
        height: 18px;
      }

      body:has(#titular-crm-grid-body) .dsc-access-filter-input {
        border-radius: 16px;
      }

      body:has(#titular-crm-grid-body) .dsc-access-grid-card > .dsc-access-pagination {
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      body:has(#titular-crm-grid-body) .dsc-access-grid-card > .dsc-access-pagination .dsc-btn {
        flex: 0 0 20%;
        width: 20%;
        max-width: 64px;
        min-width: 44px;
        min-height: 34px;
        padding: 4px 0;
        font-size: 0.84rem;
      }

      #titular-crm-pagination-info {
        margin-left: 10px;
        min-width: 140px;
        text-align: right;
      }

      .dsc-titular-toolbar-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 4px;
      }

      .dsc-titular-toolbar-title h2 {
        margin: 0;
      }

      .dsc-sort-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        gap: 6px;
      }

      .dsc-sort-button:disabled {
        cursor: default;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <div class="dsc-status-banner dsc-hidden" id="status-banner"></div>
    <main class="dsc-access-page">
      <section id="login-section" class="dsc-container">
        <div class="dsc-access-layout">
          <div class="dsc-access-management-layout">
            <div class="dsc-access-toolbar">
              <div class="dsc-titular-toolbar-title">
                <h2 id="titular-crm-popup-title">TITULAR DO CRM</h2>
                <button type="button" class="dsc-btn dsc-btn-white dsc-popup-compact-close-button" id="close-titular-crm-popup-button" aria-label="Fechar cadastro de titular do CRM">X</button>
              </div>
              <form class="dsc-access-filter-form" id="titular-crm-filter-form">
                <button type="button" class="dsc-btn dsc-btn-blue dsc-access-insert-button" id="insert-titular-crm-button">Inserir registro</button>
                <input class="dsc-form-control dsc-access-filter-input" id="titular-crm-search" type="text" placeholder="Filtrar por codigo, CNPJ/CPF ou titular do CRM" />
                <button type="submit" class="dsc-btn dsc-btn-white">Filtrar</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="clear-titular-crm-filter-button">Limpar</button>
              </form>
            </div>

            <div class="dsc-card dsc-access-grid-card">
              <div class="dsc-access-grid-header" style="align-items: flex-start; justify-content: space-between; flex-direction: row;">
                <div class="dsc-access-grid-header-copy">
                  <h2>Registros cadastrados</h2>
                  <span id="titular-crm-total"></span>
                </div>
              </div>

              <div class="dsc-access-grid-wrapper" id="titular-crm-grid-wrapper">
                <table class="dsc-access-grid" id="titular-crm-grid-table">
                  <thead>
                    <tr>
                      <th>
                        <button type="button" class="dsc-sort-button" data-sort-field="codigo">
                          Codigo
                          <span id="titular-crm-sort-codigo">↑</span>
                        </button>
                      </th>
                      <th>
                        <button type="button" class="dsc-sort-button" data-sort-field="cnpj_cpf">
                          CNPJ/CPF
                          <span id="titular-crm-sort-cnpj-cpf"></span>
                        </button>
                      </th>
                      <th>
                        <button type="button" class="dsc-sort-button" data-sort-field="titular">
                          Titular do CRM
                          <span id="titular-crm-sort-titular"></span>
                        </button>
                      </th>
                      <th class="dsc-grid-actions-column">A&ccedil;&otilde;es</th>
                    </tr>
                  </thead>
                  <tbody id="titular-crm-grid-body"></tbody>
                </table>

                <p class="dsc-empty-state dsc-hidden" id="titular-crm-empty-state">Nenhum titular do CRM encontrado.</p>
              </div>

              <p class="dsc-feedback" id="titular-crm-grid-feedback"></p>

              <div class="dsc-access-pagination">
                <button type="button" class="dsc-btn dsc-btn-white" id="first-titular-crm-page-button" title="Primeiro registro">|◀</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="previous-titular-crm-page-button" title="Registro anterior">◀</button>
                <span id="titular-crm-pagination-info">Pagina 1 de 1</span>
                <button type="button" class="dsc-btn dsc-btn-white" id="next-titular-crm-page-button" title="Proximo registro">▶</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="last-titular-crm-page-button" title="Ultimo registro">▶|</button>
              </div>
            </div>

            <div class="dsc-popup-overlay dsc-hidden" id="titular-crm-form-modal" aria-hidden="true">
              <div class="dsc-popup-shell dsc-popup-shell-ordem-servico" role="dialog" aria-modal="true" aria-labelledby="titular-crm-form-title">
                <form class="dsc-card dsc-form dsc-access-form" id="titular-crm-popup-form" novalidate>
                  <div class="dsc-form-header dsc-popup-header-sticky">
                    <div>
                      <p class="dsc-form-kicker">Cadastro administrativo - TITUCRM015</p>
                      <h2 id="titular-crm-form-title">TITULAR DO CRM</h2>
                    </div>
                    <button type="button" class="dsc-btn dsc-btn-white dsc-popup-close-button dsc-popup-compact-close-button" id="close-titular-crm-form-button" aria-label="Fechar formulario de titular do CRM">X</button>
                  </div>

                  <p class="dsc-form-subtitle" id="titular-crm-form-subtitle">Novo registro</p>

                  <label class="dsc-field-group" for="titular-crm-popup-cnpj-cpf">
                    <span>CNPJ/CPF</span>
                    <input class="dsc-form-control" id="titular-crm-popup-cnpj-cpf" type="text" inputmode="numeric" placeholder="000.000.000-00 ou 00.000.000/0000-00" maxlength="18" />
                    <div class="dsc-form-error" id="titular-crm-popup-cnpj-cpf-error"></div>
                  </label>

                  <label class="dsc-field-group" for="titular-crm-popup-nome">
                    <span>Titular do CRM</span>
                    <input class="dsc-form-control" id="titular-crm-popup-nome" type="text" maxlength="255" placeholder="TITULAR DO CRM" />
                    <div class="dsc-form-error" id="titular-crm-popup-nome-error"></div>
                  </label>

                  <p class="dsc-feedback" id="titular-crm-popup-feedback"></p>

                  <div class="dsc-login-form-buttons dsc-mt20 dsc-access-form-buttons dsc-popup-footer-sticky">
                    <button type="submit" class="dsc-btn dsc-btn-blue" id="save-titular-crm-popup-button">Salvar titular do CRM</button>
                    <button type="button" class="dsc-btn dsc-btn-white" id="cancel-titular-crm-popup-button">Cancelar</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const pageSearchParams = new URLSearchParams(window.location.search);
      const initialCnpjCpf = String(pageSearchParams.get('cnpjCpf') || '').trim();
      const shouldAutoReturn = Boolean(initialCnpjCpf);

      const PAGE_SIZE = 10;

      const filterForm = document.getElementById('titular-crm-filter-form');
      const searchInput = document.getElementById('titular-crm-search');
      const insertButton = document.getElementById('insert-titular-crm-button');
      const clearFilterButton = document.getElementById('clear-titular-crm-filter-button');
      const gridBody = document.getElementById('titular-crm-grid-body');
      const emptyState = document.getElementById('titular-crm-empty-state');
      const gridFeedback = document.getElementById('titular-crm-grid-feedback');
      const totalElement = document.getElementById('titular-crm-total');
      const paginationInfo = document.getElementById('titular-crm-pagination-info');
      const firstPageButton = document.getElementById('first-titular-crm-page-button');
      const previousPageButton = document.getElementById('previous-titular-crm-page-button');
      const nextPageButton = document.getElementById('next-titular-crm-page-button');
      const lastPageButton = document.getElementById('last-titular-crm-page-button');
      const closePopupButton = document.getElementById('close-titular-crm-popup-button');

      const sortCodigoIndicator = document.getElementById('titular-crm-sort-codigo');
      const sortCnpjCpfIndicator = document.getElementById('titular-crm-sort-cnpj-cpf');
      const sortTitularIndicator = document.getElementById('titular-crm-sort-titular');

      const formModal = document.getElementById('titular-crm-form-modal');
      const form = document.getElementById('titular-crm-popup-form');
      const formSubtitle = document.getElementById('titular-crm-form-subtitle');
      const cnpjCpfInput = document.getElementById('titular-crm-popup-cnpj-cpf');
      const nomeInput = document.getElementById('titular-crm-popup-nome');
      const cnpjCpfError = document.getElementById('titular-crm-popup-cnpj-cpf-error');
      const nomeError = document.getElementById('titular-crm-popup-nome-error');
      const feedback = document.getElementById('titular-crm-popup-feedback');
      const saveButton = document.getElementById('save-titular-crm-popup-button');
      const closeFormButton = document.getElementById('close-titular-crm-form-button');
      const cancelButton = document.getElementById('cancel-titular-crm-popup-button');

      let currentPage = 1;
      let currentSearch = '';
      let totalItems = 0;
      let totalPages = 1;
      let sortBy = 'codigo';
      let sortDirection = 'asc';
      let isLoading = false;
      let isSaving = false;
      let editingCodigo = null;
      let formMode = 'create';

      const normalizeText = (value, maxLength = 255) => String(value || '').trim().slice(0, maxLength);
      const getDocumentDigits = (value) => String(value || '').replace(/\D/g, '');

      const normalizeCnpjCpf = (value) => {
        const digits = getDocumentDigits(value).slice(0, 14);

        if (digits.length <= 11) {
          if (digits.length <= 3) {
            return digits;
          }

          if (digits.length <= 6) {
            return `${digits.slice(0, 3)}.${digits.slice(3)}`;
          }

          if (digits.length <= 9) {
            return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
          }

          return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9, 11)}`;
        }

        if (digits.length <= 12) {
          return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8)}`;
        }

        return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8, 12)}-${digits.slice(12, 14)}`;
      };

      const closePopup = () => {
        window.close();
      };

      const readJsonResponse = async (response) => {
        const contentType = response.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          return {};
        }

        return response.json();
      };

      const getRequestErrorMessage = (error, fallbackMessage) => {
        if (error instanceof Error && error.message.trim()) {
          return error.message;
        }

        return fallbackMessage;
      };

      const setGridMessage = (message, tone = '') => {
        gridFeedback.textContent = message;
        gridFeedback.className = tone ? `dsc-feedback dsc-feedback-${tone}` : 'dsc-feedback';
      };

      const updatePaginationButtons = () => {
        const canGoPrevious = currentPage > 1;
        const canGoNext = currentPage < totalPages;

        firstPageButton.disabled = isLoading || !canGoPrevious;
        previousPageButton.disabled = isLoading || !canGoPrevious;
        nextPageButton.disabled = isLoading || !canGoNext;
        lastPageButton.disabled = isLoading || !canGoNext;

        paginationInfo.textContent = `Pagina ${currentPage} de ${totalPages}`;
      };

      const updateSortIndicators = () => {
        sortCodigoIndicator.textContent = sortBy === 'codigo' ? (sortDirection === 'asc' ? '↑' : '↓') : '';
        sortCnpjCpfIndicator.textContent = sortBy === 'cnpj_cpf' ? (sortDirection === 'asc' ? '↑' : '↓') : '';
        sortTitularIndicator.textContent = sortBy === 'titular' ? (sortDirection === 'asc' ? '↑' : '↓') : '';
      };

      const notifyOpener = ({ cnpjCpf, titular }) => {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type: 'tegfinanc:titular-created',
            context: 'veiculo-titular',
            cnpjCpf,
            titular,
          }, window.location.origin);
        }
      };

      const renderGrid = (items) => {
        gridBody.innerHTML = '';

        if (!items.length) {
          emptyState.classList.remove('dsc-hidden');
          return;
        }

        emptyState.classList.add('dsc-hidden');

        items.forEach((item) => {
          const row = document.createElement('tr');
          row.dataset.item = JSON.stringify(item);
          row.innerHTML = `
            <td>${item.codigo || ''}</td>
            <td>${item.cnpj_cpf || ''}</td>
            <td>${item.titular || ''}</td>
            <td>
              <div class="dsc-grid-actions">
                <button type="button" class="dsc-grid-action-button dsc-grid-action-consulta" data-action="view" title="Consulta" aria-label="Consulta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="16.65" y1="16.65" x2="21" y2="21"></line></svg></button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-edit" data-action="edit" title="Alterar" aria-label="Alterar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5 20.5 7.5 7 21H3v-4L16.5 3.5Z"></path></svg></button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-delete" data-action="delete" title="Excluir" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg></button>
              </div>
            </td>
          `;
          gridBody.appendChild(row);
        });
      };

      const loadItems = async () => {
        isLoading = true;
        updatePaginationButtons();
        setGridMessage('Carregando registros de titular do CRM...');

        try {
          const params = new URLSearchParams({
            page: String(currentPage),
            pageSize: String(PAGE_SIZE),
            sortBy,
            sortDirection,
          });

          if (currentSearch) {
            params.set('search', currentSearch);
          }

          const response = await fetch(`/api/titular?${params.toString()}`, {
            headers: { Accept: 'application/json' },
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao carregar registros de titular do CRM.');
          }

          const items = Array.isArray(payload.items) ? payload.items : [];
          totalItems = Number(payload.total) || 0;
          totalPages = Math.max(1, Number(payload.totalPages) || 1);
          currentPage = Math.min(Math.max(1, Number(payload.page) || currentPage), totalPages);
          sortBy = String(payload.sortBy || sortBy);
          sortDirection = String(payload.sortDirection || sortDirection) === 'desc' ? 'desc' : 'asc';

          totalElement.textContent = `${totalItems} item(ns) encontrados`;
          renderGrid(items);
          setGridMessage(items.length ? '' : 'Nenhum registro encontrado na tabela titular do CRM.');
          updateSortIndicators();
        } catch (error) {
          renderGrid([]);
          setGridMessage(getRequestErrorMessage(error, 'Falha ao carregar registros de titular do CRM.'), 'error');
          totalElement.textContent = '0 item(ns) encontrados';
        } finally {
          isLoading = false;
          updatePaginationButtons();
        }
      };

      const resetFormMessages = () => {
        cnpjCpfError.textContent = '';
        nomeError.textContent = '';
        feedback.textContent = '';
        feedback.className = 'dsc-feedback';
      };

      const resetFormFields = () => {
        cnpjCpfInput.value = '';
        nomeInput.value = '';
        editingCodigo = null;
        formMode = 'create';
        resetFormMessages();
      };

      const updateFormByMode = () => {
        const isViewMode = formMode === 'view';
        cnpjCpfInput.readOnly = isViewMode;
        nomeInput.readOnly = isViewMode;
        saveButton.classList.toggle('dsc-hidden', isViewMode);

        if (formMode === 'view') {
          formSubtitle.textContent = 'Consulta de registro';
        } else if (editingCodigo) {
          formSubtitle.textContent = 'Alterar registro';
        } else {
          formSubtitle.textContent = 'Novo registro';
        }
      };

      const showForm = () => {
        formModal.classList.remove('dsc-hidden');
        formModal.setAttribute('aria-hidden', 'false');
        updateFormByMode();
        if (formMode === 'view') {
          closeFormButton.focus();
        } else if (cnpjCpfInput.value) {
          nomeInput.focus();
        } else {
          cnpjCpfInput.focus();
        }
      };

      const hideForm = () => {
        if (isSaving) {
          return;
        }

        formModal.classList.add('dsc-hidden');
        formModal.setAttribute('aria-hidden', 'true');
        resetFormFields();
      };

      const startInsert = () => {
        resetFormFields();
        formMode = 'create';
        cnpjCpfInput.value = normalizeCnpjCpf(initialCnpjCpf);
        showForm();
      };

      const startView = (item) => {
        resetFormFields();
        formMode = 'view';
        editingCodigo = String(item.codigo || '');
        cnpjCpfInput.value = normalizeCnpjCpf(String(item.cnpj_cpf || ''));
        nomeInput.value = normalizeText(String(item.titular || ''), 255);
        showForm();
      };

      const startEdit = (item) => {
        resetFormFields();
        formMode = 'edit';
        editingCodigo = String(item.codigo || '');
        cnpjCpfInput.value = normalizeCnpjCpf(String(item.cnpj_cpf || ''));
        nomeInput.value = normalizeText(String(item.titular || ''), 255);
        showForm();
      };

      const handleDelete = async (item) => {
        if (!window.confirm(`Excluir o titular do CRM ${item.codigo} - ${item.cnpj_cpf}?`)) {
          return;
        }

        setGridMessage(`Excluindo titular ${item.codigo}...`);

        try {
          const response = await fetch(`/api/titular/${encodeURIComponent(item.codigo)}`, {
            method: 'DELETE',
            headers: { Accept: 'application/json' },
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao excluir titular do CRM.');
          }

          if (currentPage > 1 && totalItems <= (currentPage - 1) * PAGE_SIZE + 1) {
            currentPage -= 1;
          }

          setGridMessage('Titular do CRM excluido com sucesso.', 'success');
          await loadItems();
        } catch (error) {
          setGridMessage(getRequestErrorMessage(error, 'Falha ao excluir titular do CRM.'), 'error');
        }
      };

      filterForm.addEventListener('submit', (event) => {
        event.preventDefault();
        currentSearch = normalizeText(searchInput.value, 255);
        searchInput.value = currentSearch;
        currentPage = 1;
        void loadItems();
      });

      clearFilterButton.addEventListener('click', () => {
        searchInput.value = '';
        currentSearch = '';
        currentPage = 1;
        void loadItems();
      });

      insertButton.addEventListener('click', startInsert);

      closePopupButton.addEventListener('click', closePopup);

      firstPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }
        currentPage = 1;
        void loadItems();
      });

      previousPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }
        currentPage -= 1;
        void loadItems();
      });

      nextPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }
        currentPage += 1;
        void loadItems();
      });

      lastPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }
        currentPage = totalPages;
        void loadItems();
      });

      document.querySelectorAll('.dsc-sort-button').forEach((button) => {
        button.addEventListener('click', () => {
          const field = button.dataset.sortField;

          if (!field) {
            return;
          }

          if (sortBy === field) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
          } else {
            sortBy = field;
            sortDirection = 'asc';
          }

          currentPage = 1;
          updateSortIndicators();
          void loadItems();
        });
      });

      gridBody.addEventListener('click', (event) => {
        const target = event.target;
        const button = target instanceof Element ? target.closest('button[data-action]') : null;
        const row = target instanceof Element ? target.closest('tr') : null;

        if (!button || !row) {
          return;
        }

        const rawItem = row.dataset.item || '';

        if (!rawItem) {
          return;
        }

        const item = JSON.parse(rawItem);
        const action = button.dataset.action;

        if (action === 'view') {
          startView(item);
          return;
        }

        if (action === 'edit') {
          startEdit(item);
          return;
        }

        if (action === 'delete') {
          void handleDelete(item);
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (formMode === 'view') {
          hideForm();
          return;
        }

        const cnpjCpf = normalizeCnpjCpf(cnpjCpfInput.value);
        const titular = normalizeText(nomeInput.value, 255);
        const digits = getDocumentDigits(cnpjCpf);

        cnpjCpfInput.value = cnpjCpf;
        nomeInput.value = titular;
        resetFormMessages();

        let hasError = false;

        if (![11, 14].includes(digits.length)) {
          cnpjCpfError.textContent = 'Informe um CNPJ/CPF com 11 ou 14 digitos.';
          hasError = true;
        }

        if (!titular) {
          nomeError.textContent = 'Titular do CRM e obrigatorio.';
          hasError = true;
        }

        if (hasError) {
          feedback.textContent = 'Corrija os campos para continuar.';
          feedback.className = 'dsc-feedback dsc-feedback-error';
          return;
        }

        isSaving = true;
        saveButton.disabled = true;
        saveButton.textContent = 'Salvando...';
        feedback.textContent = editingCodigo ? 'Alterando titular do CRM...' : 'Gravando titular do CRM...';

        try {
          const requestUrl = editingCodigo
            ? `/api/titular/${encodeURIComponent(editingCodigo)}`
            : '/api/titular';
          const requestMethod = editingCodigo ? 'PUT' : 'POST';

          const response = await fetch(requestUrl, {
            method: requestMethod,
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({
              cnpjCpf,
              titular,
            }),
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao salvar titular do CRM.');
          }

          const savedItem = payload.item || {};
          const savedCnpjCpf = normalizeCnpjCpf(String(savedItem.cnpj_cpf || cnpjCpf));
          const savedTitular = normalizeText(String(savedItem.titular || titular), 255);

          notifyOpener({ cnpjCpf: savedCnpjCpf, titular: savedTitular });

          feedback.textContent = editingCodigo
            ? 'Titular do CRM alterado com sucesso.'
            : 'Titular do CRM cadastrado com sucesso.';
          feedback.className = 'dsc-feedback dsc-feedback-success';

          hideForm();
          await loadItems();
          setGridMessage(feedback.textContent, 'success');

          if (shouldAutoReturn) {
            window.setTimeout(() => {
              closePopup();
            }, 120);
          }
        } catch (error) {
          feedback.textContent = getRequestErrorMessage(error, 'Falha ao salvar titular do CRM.');
          feedback.className = 'dsc-feedback dsc-feedback-error';
        } finally {
          isSaving = false;
          saveButton.disabled = false;
          saveButton.textContent = 'Salvar titular do CRM';
        }
      });

      cnpjCpfInput.addEventListener('input', () => {
        cnpjCpfInput.value = normalizeCnpjCpf(cnpjCpfInput.value);
        cnpjCpfError.textContent = '';
      });

      nomeInput.addEventListener('input', () => {
        nomeInput.value = normalizeText(nomeInput.value, 255);
        nomeError.textContent = '';
      });

      formModal.addEventListener('click', (event) => {
        if (event.target === formModal) {
          hideForm();
        }
      });

      closeFormButton.addEventListener('click', hideForm);
      cancelButton.addEventListener('click', hideForm);

      searchInput.value = normalizeCnpjCpf(initialCnpjCpf);
      currentSearch = searchInput.value;

      if (searchInput.value) {
        startInsert();
      }

      updateSortIndicators();
      void loadItems();
    </script>
  </body>
</html>
